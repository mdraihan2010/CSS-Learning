<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>CSS Class & ID Practice</title>

    <link rel="stylesheet" href="style.css" />
  </head>

  <body>
    <h1>CSS Class & ID Practice</h1>

    <p>This is a paragraph without any class or id.</p>

    <p id="profile-name">MD Raihan</p>

    <h2 class="highlight-text">
      This is an h2 with the class "highlight-text".
    </h2>

    <p class="highlight-text">
      This is a paragraph with the class "highlight-text".
    </p>

    <p id="important-message">
      This is a paragraph with the id "important-message".
    </p>
  </body>
</html>
