<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />

    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <title>CSS Linkable Icon Button</title>

    <!-- Font Awesome -->

    <link
      rel="stylesheet"
      href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.7.2/css/all.min.css"
    />

    <!-- CSS -->

    <link rel="stylesheet" href="style.css" />
  </head>

  <body>
    <div class="social-media">
      <h1>Social Media Icon Buttons</h1>

      <p>Click any icon to visit the social media page.</p>

      <!-- Facebook -->

      <a href="https://facebook.com" target="_blank" class="btn facebook">
        <i class="fa-brands fa-facebook-f"></i>
      </a>

      <!-- Website -->

      <a href="https://google.com" target="_blank" class="btn website">
        <i class="fa-solid fa-globe"></i>
      </a>

      <!-- YouTube -->

      <a href="https://youtube.com" target="_blank" class="btn youtube">
        <i class="fa-brands fa-youtube"></i>
      </a>

      <!-- LinkedIn -->

      <a href="https://linkedin.com" target="_blank" class="btn linkedin">
        <i class="fa-brands fa-linkedin-in"></i>
      </a>

      <!-- GitHub -->

      <a href="https://github.com" target="_blank" class="btn github">
        <i class="fa-brands fa-github"></i>
      </a>
    </div>
  </body>
</html>
