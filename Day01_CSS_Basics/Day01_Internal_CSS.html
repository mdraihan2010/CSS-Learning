<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Internal CSS Practice</title>

    <style>
      body {
        background-color: lightgray;
      }

      h1 {
        color: red;
        text-align: center;
      }

      h2 {
        color: blue;
      }

      p {
        color: green;
        font-size: 20px;
      }
      span {
        color: purple;
        font-weight: bold;
      }

      button {
        background-color: black;
        color: white;
        font-size: 16px;
      }
    </style>
  </head>

  <body>
    <h1>Welcome to CSS</h1>

    <h2>Learning Internal CSS</h2>

    <p>This is my first Internal CSS example.</p>

    <p>CSS makes HTML pages <span>beautiful</span>.</p>

    <p>
      My name is John Doe. I am a
      <span>professional</span>
      web developer.
    </p>

    <p>
      I am learning
      <span>Internal CSS</span>
      today.
    </p>

    <button>Click Me</button>
  </body>
</html>
