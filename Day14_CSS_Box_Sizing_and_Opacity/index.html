<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CSS Box Sizing & Opacity Practice</title>

    <link rel="stylesheet" href="style.css">
</head>

<body>

    <h1>CSS Box Sizing & Opacity Practice</h1>

    <!-- =========================================
         Box Sizing
    ========================================== -->

    <section>

        <h2>1. Content Box (Default)</h2>

        <div class="box content-box">

            Content Box

        </div>

    </section>

    <section>

        <h2>2. Border Box</h2>

        <div class="box border-box">

            Border Box

        </div>

    </section>

    <!-- =========================================
         Opacity
    ========================================== -->

    <section>

        <h2>3. Opacity Example</h2>

        <div class="opacity-container">

            <div class="opacity-box opacity-1">

                Opacity: 1

            </div>

            <div class="opacity-box opacity-05">

                Opacity: 0.5

            </div>

            <div class="opacity-box opacity-0">

                Opacity: 0

            </div>

        </div>

    </section>

</body>
</html>
